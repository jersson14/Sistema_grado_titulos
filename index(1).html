<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Integración de Chatwoot</title>
</head>
<body>
    <h1>Mi Sitio Web con Chatwoot</h1>
    <p>¡Hola! Este es un ejemplo de cómo usar Chatwoot.</p>

    <!-- Chatwoot Script -->
    <script>
      (function(d,t) {
        var BASE_URL="https://dhhfkhmz8sbbu.cloudfront.net";
        var g=d.createElement(t),s=d.getElementsByTagName(t)[0];
        g.src=BASE_URL+"/packs/js/sdk.js";
        g.defer = true;
        g.async = true;
        s.parentNode.insertBefore(g,s);
        g.onload=function(){
          window.chatwootSDK.run({
            websiteToken: 'JA5RBoDMsdCr51mGpf1CxVST',
            baseUrl: BASE_URL
          })
        }
      })(document,"script");
    </script>
</body>
</html>
